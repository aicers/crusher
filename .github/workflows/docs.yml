name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "**/*.md"
      - ".markdownlint*"
      - "scripts/fetch-theme.sh"
      - "scripts/build-docs-pdf.sh"
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "**/*.md"
      - ".markdownlint*"
      - "scripts/fetch-theme.sh"
      - "scripts/build-docs-pdf.sh"

permissions:
  contents: read

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache docs theme
        uses: actions/cache@v4
        with:
          path: docs/.theme
          key: ${{ runner.os }}-docs-theme-${{ hashFiles('docs/theme.toml') }}

      - name: Install MkDocs
        run: python3 -m pip install --upgrade pip mkdocs-material

      - name: Fetch Docs Theme
        run: ./scripts/fetch-theme.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: mkdocs build --strict

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: "**/*.md"
